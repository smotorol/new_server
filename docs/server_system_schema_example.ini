; Runtime INI SYSTEM schema example
; - CONFIG_FAIL_FAST: 0(auto-heal), 1(fail-fast)
; - CONFIG_SCHEMA_VERSION: current expected schema version

[SYSTEM]
CONFIG_FAIL_FAST=0
CONFIG_SCHEMA_VERSION=1

; Optional: environment/stage specific override examples
; CONFIG_FAIL_FAST=1    ; recommended for dev/staging
; CONFIG_SCHEMA_VERSION=1
